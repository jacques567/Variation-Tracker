name: Auto-update PR branches

# Keeps every open PR branch caught up with main automatically, so branch
# protection ("must be up to date before merging") never blocks a merge
# just because main moved on while the PR was open.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-prs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge main into each open PR branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          branches=$(gh pr list --state open --json headRefName -q '.[].headRefName')

          for branch in $branches; do
            echo "Updating $branch..."
            git checkout "$branch"
            if git merge origin/main --no-edit; then
              git push origin "$branch"
              echo "✅ $branch updated"
            else
              echo "⚠️ $branch has a merge conflict with main — skipping, needs manual resolution"
              git merge --abort
            fi
          done
